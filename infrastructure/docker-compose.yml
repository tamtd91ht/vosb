# Local infrastructure stack — Postgres 16 / Redis 7 / RabbitMQ 3.13.
#
# Mục đích: chạy data services trên máy dev để gateway backend (chạy host hoặc
# container) có thể kết nối local. Credential default ở đây khớp với default
# của `gateway/backend/.../application.yml`, nên có thể chạy backend mà không
# cần override env.
#
# Usage:
#   cp .env.example .env             # (tuỳ chọn) chỉnh password
#   docker compose up -d
#   docker compose ps
#   docker compose logs -f postgres
#   docker compose down              # stop, KHÔNG xoá data (volume vẫn còn)
#   docker compose down -v           # CẨN THẬN: xoá volume → mất toàn bộ data
#
# Ports expose ra 127.0.0.1 cho dev local (backend chạy host kết nối qua
# localhost). Nếu chạy backend trong docker, join `infra-net` external.

name: vosb-infra

services:
  postgres:
    image: postgres:16-alpine
    container_name: vosb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smpp_db}
      POSTGRES_USER: ${POSTGRES_USER:-smpp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smpp_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - infra-net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smpp_user} -d ${POSTGRES_DB:-smpp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: vosb-redis
    restart: unless-stopped
    # Local dev: không bật password (khớp default `REDIS_PASSWORD=` của backend).
    # Prod: dùng `--requirepass ${REDIS_PASSWORD}`.
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - infra-net
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vosb-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smpp_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smpp_pass}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-vosb_local_cookie}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - infra-net
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  infra-net:
    name: infra-net
    driver: bridge
