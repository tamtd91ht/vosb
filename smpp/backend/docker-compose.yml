# App stack — chỉ smpp-server. Infra (Postgres / Redis / RabbitMQ) chạy trong compose riêng,
# join qua external network `infra-net` (đã quy hoạch tách hạ tầng từ đầu).
#
# Prerequisites trước khi `docker compose up`:
#   1. Network `infra-net` đã tồn tại (do infra compose tạo).
#   2. Container Postgres / Redis / RabbitMQ reachable trên `infra-net` với DNS name khớp
#      ${DB_HOST}/${REDIS_HOST}/${RABBITMQ_HOST} (default: postgres / redis / rabbitmq).
#   3. File `.env` cùng thư mục đặt: APP_JWT_SECRET, APP_SECRET_KEY, DB_PASSWORD,
#      RABBITMQ_PASSWORD, REDIS_PASSWORD (nếu Redis bật auth).
#
# Usage:
#   docker compose build smpp-server
#   docker compose up -d
#   docker compose logs -f smpp-server
#   docker compose down                # stop, KHÔNG xoá gì (chỉ container app)

name: smpp-app

services:
  smpp-server:
    build:
      context: .
      dockerfile: smpp-server/Dockerfile
    image: smpp-server:${IMAGE_TAG:-dev}
    container_name: smpp-server
    restart: unless-stopped
    networks: [infra-net]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Postgres
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-smpp_db}
      DB_USER: ${DB_USER:-smpp_user}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # RabbitMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-smpp_admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      # App secrets — phải set trong .env hoặc env vars CI/CD.
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_SECRET_KEY: ${APP_SECRET_KEY}

      HTTP_PORT: 8080
      SMPP_PORT: 2775
    ports:
      # HTTP: bind loopback — Nginx (host) reverse-proxy vào.
      - "${HTTP_BIND:-127.0.0.1:8080}:8080"
      # SMPP: prod cần expose 0.0.0.0 cho partner bind từ ngoài. Override qua .env.
      - "${SMPP_BIND:-127.0.0.1:2775}:2775"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 45s

networks:
  infra-net:
    external: true
