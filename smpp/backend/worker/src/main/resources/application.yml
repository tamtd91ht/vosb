spring:
  application:
    name: smpp-worker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smpp_db}
    username: ${DB_USER:smpp_user}
    password: ${DB_PASSWORD:smpp_pass}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      initialization-fail-timeout: -1
      connection-timeout: ${DB_CONN_TIMEOUT:2000}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        shutdown-timeout: 100ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:smpp_admin}
    password: ${RABBITMQ_PASSWORD:smpp_pass}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        concurrency: ${WORKER_CONCURRENCY:4}
        max-concurrency: ${WORKER_MAX_CONCURRENCY:16}
        prefetch: ${WORKER_PREFETCH:8}

  main:
    web-application-type: none
    lazy-initialization: false

logging:
  level:
    root: INFO
    com.smpp: DEBUG
    org.hibernate.SQL: WARN
